<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daruma Wish - Mood Selection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        daruma: {
                            red: '#E04A3A',
                            orange: '#F27D42',
                            cream: '#FDFBF7',
                            gold: '#F4B942',
                            dark: '#2D2A26',
                            paper: '#F5EFE6',
                            blue: '#2471E7',
                            green: '#71E07E',
                            purple: '#B592FF',
                            softblue: '#95C6FF'
                        }
                    },
                    fontFamily: {
                        sans: ['Nunito', 'sans-serif'],
                        display: ['Quicksand', 'sans-serif'],
                    },
                    boxShadow: {
                        'soft': '0 8px 30px rgba(224, 74, 58, 0.08)',
                        'card': '0 4px 20px rgba(0, 0, 0, 0.05)',
                        'button': '0 6px 0 rgba(193, 56, 43, 1)',
                        'button-hover': '0 2px 0 rgba(193, 56, 43, 1)',
                        'chip': '0 4px 12px rgba(0,0,0,0.05)',
                        'chip-active': '0 0 0 2px #E04A3A, 0 4px 12px rgba(224, 74, 58, 0.2)'
                    },
                    backgroundImage: {
                        'paper-texture': "url('data:image/svg+xml,%3Csvg width=\\'20\\' height=\\'20\\' viewBox=\\'0 0 20 20\\' xmlns=\\'http://www.w3.org/2000/svg\\'%3E%3Cg fill=\\'%23e04a3a\\' fill-opacity=\\'0.02\\' fill-rule=\\'evenodd\\'%3E%3Ccircle cx=\\'3\\' cy=\\'3\\' r=\\'3\\'/%3E%3Ccircle cx=\\'13\\' cy=\\'13\\' r=\\'3\\'/%3E%3C/g%3E%3C/svg%3E')",
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0E152A; /* Dark theme from inspiration */
            background-image: url('data:image/svg+xml,%3Csvg width=\\'20\\' height=\\'20\\' viewBox=\\'0 0 20 20\\' xmlns=\\'http://www.w3.org/2000/svg\\'%3E%3Cg fill=\\'%23ffffff\\' fill-opacity=\\'0.02\\' fill-rule=\\'evenodd\\'%3E%3Ccircle cx=\\'3\\' cy=\\'3\\' r=\\'3\\'/%3E%3Ccircle cx=\\'13\\' cy=\\'13\\' r=\\'3\\'/%3E%3C/g%3E%3C/svg%3E');
        }
        .btn-press {
            transition: all 0.1s ease;
        }
        .btn-press:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 rgba(193, 56, 43, 1);
        }
        .mood-chip {
            transition: all 0.2s ease;
        }
        .mood-chip:active {
            transform: scale(0.95);
        }
        ::-webkit-scrollbar { display: none; }
        
        /* Gradient Backgrounds for Chips based on inspiration */
        .bg-grad-hopeful { background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(244,185,66,0.15) 100%); border: 1px solid rgba(255,255,255,0.1); }
        .bg-grad-calm { background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(149,198,255,0.15) 100%); border: 1px solid rgba(255,255,255,0.1); }
        .bg-grad-determined { background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(224,74,58,0.15) 100%); border: 1px solid rgba(255,255,255,0.1); }
        .bg-grad-grateful { background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(181,146,255,0.15) 100%); border: 1px solid rgba(255,255,255,0.1); }
        .bg-grad-healing { background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(113,224,126,0.15) 100%); border: 1px solid rgba(255,255,255,0.1); }
        .bg-grad-courage { background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(242,125,66,0.15) 100%); border: 1px solid rgba(255,255,255,0.1); }

        .chip-active-state {
            background: rgba(255,255,255,0.2) !important;
            border-color: rgba(255,255,255,0.5) !important;
            box-shadow: 0 0 20px rgba(255,255,255,0.1);
        }
    </style>
</head>
<body class="text-white antialiased w-full min-h-screen overflow-x-hidden flex justify-center">

    <!-- Mobile Wrapper -->
    <div class="w-full max-w-[480px] min-h-screen bg-[#0E152A] relative shadow-[0_0_50px_rgba(0,0,0,0.3)] flex flex-col">

        <!-- Navigation -->
        <nav id="header" class="w-full px-6 pt-12 pb-4 flex justify-between items-center bg-[#0E152A]/90 backdrop-blur-md sticky top-0 z-50 border-b border-white/10">
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 rounded-full bg-daruma-red flex items-center justify-center text-white shadow-sm">
                    <i class="fa-solid fa-yin-yang text-xl"></i>
                </div>
                <span class="font-display font-bold text-xl tracking-tight text-white">Daruma Wish</span>
            </div>
            <button class="w-10 h-10 rounded-full bg-white/10 shadow-card flex items-center justify-center text-white hover:bg-white/20 transition-colors">
                <i class="fa-solid fa-bars"></i>
            </button>
        </nav>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col pb-24 relative">
            
            <!-- Ambient Background Glows -->
            <div class="absolute top-20 left-10 w-48 h-48 bg-daruma-softblue/20 rounded-full blur-[60px] pointer-events-none"></div>
            <div class="absolute bottom-40 right-10 w-64 h-64 bg-daruma-purple/10 rounded-full blur-[80px] pointer-events-none"></div>

            <!-- Header Section -->
            <section id="mood-header" class="px-6 pt-8 pb-6 text-center relative z-10">
                <h1 class="font-display font-black text-3xl md:text-4xl leading-tight mb-2 text-white">
                    How are you feeling?
                </h1>
                <p class="text-gray-300 text-base font-medium">
                    Select a mood to set the tone for your wish.
                </p>
            </section>

            <!-- Daruma Preview Section -->
            <section id="daruma-preview" class="px-6 py-4 flex justify-center relative z-10">
                <div class="relative w-40 h-40 bg-white/5 rounded-full p-4 border border-white/10 backdrop-blur-sm flex items-center justify-center shadow-lg">
                    <!-- Glow effect behind daruma -->
                    <div class="absolute inset-0 bg-daruma-gold/20 rounded-full blur-xl animate-pulse"></div>
                    <img class="w-full h-full object-contain drop-shadow-2xl relative z-10" src="https://storage.googleapis.com/uxpilot-auth.appspot.com/0d2ba59086-22ba7b64ec72d7a814bb.png" alt="Cute Daruma doll preview" />
                    
                    <!-- Floating particles -->
                    <div class="absolute top-2 left-4 text-daruma-gold text-xs animate-bounce"><i class="fa-solid fa-sparkles"></i></div>
                    <div class="absolute bottom-4 right-2 text-white/50 text-xs animate-pulse"><i class="fa-solid fa-star"></i></div>
                </div>
            </section>

            <!-- Mood Grid Section -->
            <section id="mood-grid" class="px-6 py-6 relative z-10">
                <div class="grid grid-cols-2 gap-4">
                    
                    <!-- Hopeful -->
                    <button class="mood-chip bg-grad-hopeful rounded-2xl p-4 flex flex-col items-center justify-center gap-3 h-28 chip-active-state">
                        <div class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center text-daruma-gold text-xl">
                            <i class="fa-solid fa-sun"></i>
                        </div>
                        <span class="font-display font-bold text-white text-sm">Hopeful</span>
                    </button>

                    <!-- Calm -->
                    <button class="mood-chip bg-grad-calm rounded-2xl p-4 flex flex-col items-center justify-center gap-3 h-28">
                        <div class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center text-daruma-softblue text-xl">
                            <i class="fa-solid fa-water"></i>
                        </div>
                        <span class="font-display font-bold text-white text-sm">Calm</span>
                    </button>

                    <!-- Determined -->
                    <button class="mood-chip bg-grad-determined rounded-2xl p-4 flex flex-col items-center justify-center gap-3 h-28">
                        <div class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center text-daruma-red text-xl">
                            <i class="fa-solid fa-fire"></i>
                        </div>
                        <span class="font-display font-bold text-white text-sm">Determined</span>
                    </button>

                    <!-- Grateful -->
                    <button class="mood-chip bg-grad-grateful rounded-2xl p-4 flex flex-col items-center justify-center gap-3 h-28">
                        <div class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center text-daruma-purple text-xl">
                            <i class="fa-solid fa-hands-praying"></i>
                        </div>
                        <span class="font-display font-bold text-white text-sm">Grateful</span>
                    </button>

                    <!-- Healing -->
                    <button class="mood-chip bg-grad-healing rounded-2xl p-4 flex flex-col items-center justify-center gap-3 h-28">
                        <div class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center text-daruma-green text-xl">
                            <i class="fa-solid fa-leaf"></i>
                        </div>
                        <span class="font-display font-bold text-white text-sm">Healing</span>
                    </button>

                    <!-- Courage -->
                    <button class="mood-chip bg-grad-courage rounded-2xl p-4 flex flex-col items-center justify-center gap-3 h-28">
                        <div class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center text-daruma-orange text-xl">
                            <i class="fa-solid fa-shield-heart"></i>
                        </div>
                        <span class="font-display font-bold text-white text-sm">Courage</span>
                    </button>

                </div>
            </section>

            <!-- Action Footer -->
            <section id="action-footer" class="px-6 py-8 mt-auto relative z-10 flex flex-col gap-4">
                <button class="btn-press w-full bg-daruma-blue text-white font-display font-bold text-lg py-4 rounded-2xl shadow-lg flex items-center justify-center gap-2 hover:bg-blue-600 transition-colors">
                    <span>Continue</span>
                    <i class="fa-solid fa-arrow-right"></i>
                </button>
                <button class="w-full bg-transparent border border-white/20 text-white font-display font-bold text-lg py-4 rounded-2xl flex items-center justify-center gap-2 hover:bg-white/5 transition-colors">
                    Back to Home
                </button>
            </section>

        </main>

        <!-- Bottom Navigation Bar -->
        <nav id="bottom-nav" class="fixed bottom-0 w-full max-w-[480px] bg-[#0E152A] border-t border-white/10 pb-safe pt-2 px-6 flex justify-between items-center z-50 rounded-t-3xl">
            <a href="#" class="flex flex-col items-center p-2 text-daruma-red">
                <div class="w-12 h-12 rounded-full bg-white/5 flex items-center justify-center mb-1">
                    <i class="fa-solid fa-house text-xl"></i>
                </div>
                <span class="text-[10px] font-bold">Home</span>
            </a>
            <a href="#" class="flex flex-col items-center p-2 text-gray-400 hover:text-white transition-colors">
                <div class="w-12 h-12 rounded-full flex items-center justify-center mb-1">
                    <i class="fa-solid fa-earth-americas text-xl"></i>
                </div>
                <span class="text-[10px] font-bold">Community</span>
            </a>
            <a href="#" class="flex flex-col items-center p-2 text-gray-400 hover:text-white transition-colors">
                <div class="w-12 h-12 rounded-full flex items-center justify-center mb-1">
                    <i class="fa-solid fa-book-bookmark text-xl"></i>
                </div>
                <span class="text-[10px] font-bold">Archive</span>
            </a>
            <a href="#" class="flex flex-col items-center p-2 text-gray-400 hover:text-white transition-colors">
                <div class="w-12 h-12 rounded-full flex items-center justify-center mb-1">
                    <i class="fa-solid fa-user text-xl"></i>
                </div>
                <span class="text-[10px] font-bold">Profile</span>
            </a>
        </nav>

    </div>

    <script>
        // Simple script to handle chip selection visual toggle
        document.addEventListener('DOMContentLoaded', () => {
            const chips = document.querySelectorAll('.mood-chip');
            chips.forEach(chip => {
                chip.addEventListener('click', () => {
                    // Remove active class from all
                    chips.forEach(c => c.classList.remove('chip-active-state'));
                    // Add to clicked
                    chip.classList.add('chip-active-state');
                });
            });
        });
    </script>
</body>
</html>
