<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daruma Wish - Wish Result Card</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Quicksand:wght@500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        daruma: {
                            red: '#E04A3A',
                            orange: '#F27D42',
                            cream: '#FDFBF7',
                            gold: '#F4B942',
                            dark: '#1B1E28',
                            paper: '#F5EFE6',
                            blue: '#2471E7',
                            green: '#71E07E',
                            purple: '#8C52FF',
                            softblue: '#95C6FF',
                            bg: '#141722',
                            panel: '#1E2235',
                            accent: '#A855F7'
                        }
                    },
                    fontFamily: {
                        sans: ['Nunito', 'sans-serif'],
                        display: ['Quicksand', 'sans-serif'],
                    },
                    boxShadow: {
                        'soft': '0 8px 30px rgba(168, 85, 247, 0.15)',
                        'card': '0 4px 20px rgba(0, 0, 0, 0.2)',
                        'button': '0 6px 0 rgba(107, 33, 168, 1)',
                        'button-hover': '0 2px 0 rgba(107, 33, 168, 1)',
                        'glow': '0 0 20px rgba(168, 85, 247, 0.4)',
                        'wish-card': '0 20px 40px -10px rgba(0,0,0,0.5), 0 0 20px rgba(168,85,247,0.2)'
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'confetti': 'confetti 3s ease-out forwards',
                        'card-appear': 'cardAppear 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
                        'stamp': 'stamp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.5s forwards'
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        },
                        confetti: {
                            '0%': { transform: 'translateY(0) rotate(0deg)', opacity: 1 },
                            '100%': { transform: 'translateY(100vh) rotate(720deg)', opacity: 0 }
                        },
                        cardAppear: {
                            '0%': { transform: 'scale(0.8) translateY(50px)', opacity: 0 },
                            '100%': { transform: 'scale(1) translateY(0)', opacity: 1 }
                        },
                        stamp: {
                            '0%': { transform: 'scale(2) rotate(-20deg)', opacity: 0 },
                            '100%': { transform: 'scale(1) rotate(-10deg)', opacity: 1 }
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #141722;
            background-image: radial-gradient(circle at 50% 0%, #2A1B3D 0%, #141722 70%);
        }
        .btn-press {
            transition: all 0.1s ease;
        }
        .btn-press:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 rgba(107, 33, 168, 1);
        }
        .btn-outline:active {
            transform: translateY(2px);
        }
        ::-webkit-scrollbar { display: none; }

        .glass-panel {
            background: rgba(30, 34, 53, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .wish-card-texture {
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E");
        }

        .confetti-piece {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #A855F7;
            top: -20px;
            z-index: 100;
            opacity: 0;
            border-radius: 2px;
        }

        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom, 20px);
        }
    </style>
</head>
<body class="text-white antialiased w-full min-h-screen overflow-x-hidden flex justify-center m-0">

    <!-- Mobile Wrapper -->
    <div class="w-full max-w-[480px] min-h-screen relative shadow-[0_0_50px_rgba(0,0,0,0.5)] flex flex-col bg-[#141722]">

        <!-- Confetti Container -->
        <div id="confetti-container" class="absolute inset-0 pointer-events-none overflow-hidden z-50"></div>

        <!-- Navigation -->
        <nav id="header" class="w-full px-6 pt-12 pb-4 flex justify-between items-center bg-[#141722]/80 backdrop-blur-md sticky top-0 z-50 border-b border-white/5">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-daruma-purple to-purple-900 flex items-center justify-center text-white shadow-glow">
                    <i class="fa-solid fa-yin-yang text-xl"></i>
                </div>
                <span class="font-display font-bold text-xl tracking-tight text-white">Daruma Wish</span>
            </div>
            <button class="w-10 h-10 rounded-xl glass-panel flex items-center justify-center text-white hover:bg-white/10 transition-colors">
                <i class="fa-solid fa-bars"></i>
            </button>
        </nav>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col relative overflow-hidden pb-24">
            
            <!-- Ambient Background Glows -->
            <div class="absolute top-1/4 left-1/2 -translate-x-1/2 w-[300px] h-[300px] bg-daruma-purple/20 rounded-full blur-[80px] pointer-events-none z-0"></div>
            <div class="absolute bottom-1/3 right-0 w-48 h-48 bg-blue-500/10 rounded-full blur-[60px] pointer-events-none z-0"></div>
            <div class="absolute top-1/2 left-0 w-40 h-40 bg-daruma-red/10 rounded-full blur-[50px] pointer-events-none z-0"></div>

            <!-- Header Section -->
            <section id="result-header" class="px-6 pt-6 pb-2 relative z-10 text-center">
                <div class="inline-flex items-center justify-center px-4 py-1.5 rounded-full bg-green-500/20 border border-green-500/30 text-green-400 text-xs font-bold tracking-wider uppercase mb-3 shadow-[0_0_15px_rgba(74,222,128,0.2)]">
                    <i class="fa-solid fa-check-circle mr-2"></i> Wish Sealed
                </div>
                <h1 class="font-display font-black text-2xl text-white mb-1">Your Daruma is Ready</h1>
                <p class="text-gray-400 text-sm font-medium">Keep it close, or share it with the world.</p>
            </section>

            <!-- Wish Card Section -->
            <section id="wish-card-container" class="flex-1 flex flex-col items-center justify-center relative z-10 px-6 py-4">
                
                <!-- The Card -->
                <div class="w-full max-w-[340px] bg-daruma-paper rounded-[32px] p-6 relative shadow-wish-card animate-card-appear overflow-hidden wish-card-texture">
                    
                    <!-- Decorative Corner Elements -->
                    <div class="absolute top-4 left-4 w-8 h-8 border-t-2 border-l-2 border-daruma-dark/10 rounded-tl-xl"></div>
                    <div class="absolute top-4 right-4 w-8 h-8 border-t-2 border-r-2 border-daruma-dark/10 rounded-tr-xl"></div>
                    <div class="absolute bottom-4 left-4 w-8 h-8 border-b-2 border-l-2 border-daruma-dark/10 rounded-bl-xl"></div>
                    <div class="absolute bottom-4 right-4 w-8 h-8 border-b-2 border-r-2 border-daruma-dark/10 rounded-br-xl"></div>

                    <!-- Seal / Stamp (Animated) -->
                    <div class="absolute top-6 right-6 w-16 h-16 opacity-0 animate-stamp z-20 pointer-events-none mix-blend-multiply">
                        <img class="w-full h-full object-contain" src="https://storage.googleapis.com/uxpilot-auth.appspot.com/4cdf6872a7-8fb5e5270fb44f7cb465.png" alt="A red Japanese hanko stamp seal with traditional characters, slightly distressed texture, isolated on white" />
                    </div>

                    <!-- Card Content -->
                    <div class="relative z-10 flex flex-col items-center text-daruma-dark">
                        
                        <!-- Date & Mood -->
                        <div class="w-full flex justify-between items-center mb-6 border-b border-daruma-dark/10 pb-3">
                            <div class="flex flex-col">
                                <span class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Date Sealed</span>
                                <span class="text-sm font-bold text-daruma-dark">Oct 24, 2023</span>
                            </div>
                            <div class="flex items-center gap-2 bg-daruma-purple/10 px-3 py-1.5 rounded-full">
                                <i class="fa-solid fa-face-smile-beam text-daruma-purple text-sm"></i>
                                <span class="text-xs font-bold text-daruma-purple">Hopeful</span>
                            </div>
                        </div>

                        <!-- Daruma Illustration -->
                        <div class="w-40 h-40 mb-6 relative">
                            <img class="w-full h-full object-contain drop-shadow-xl" src="https://storage.googleapis.com/uxpilot-auth.appspot.com/bf3d74e82b-90b36c80a29348b4b012.png" alt="A cute, modern 3D render of a Japanese Daruma doll. The left eye is painted black, the right eye is completely blank white. Soft dramatic lighting, stylized cartoonish look. Transparent background." />
                            <!-- Subtle glow behind Daruma -->
                            <div class="absolute inset-0 bg-daruma-purple/20 blur-2xl rounded-full -z-10"></div>
                        </div>

                        <!-- Wish Text -->
                        <div class="text-center w-full mb-4">
                            <h3 class="font-display font-bold text-lg mb-2 text-daruma-dark">My Intention</h3>
                            <div class="bg-white/50 rounded-2xl p-4 border border-daruma-dark/5 relative">
                                <i class="fa-solid fa-quote-left absolute top-2 left-2 text-daruma-dark/10 text-xl"></i>
                                <p class="font-sans text-daruma-dark/80 font-semibold leading-relaxed relative z-10">
                                    "To find peace in the present moment and trust the journey ahead, knowing every step has purpose."
                                </p>
                                <i class="fa-solid fa-quote-right absolute bottom-2 right-2 text-daruma-dark/10 text-xl"></i>
                            </div>
                        </div>

                        <!-- Card Footer -->
                        <div class="w-full flex justify-center items-center pt-3 border-t border-daruma-dark/10">
                            <div class="flex items-center gap-2 opacity-60">
                                <i class="fa-solid fa-yin-yang text-daruma-dark text-xs"></i>
                                <span class="font-display font-bold text-[10px] tracking-widest uppercase">Daruma Wish</span>
                            </div>
                        </div>

                    </div>
                </div>

            </section>

            <!-- Actions Section -->
            <section id="card-actions" class="px-6 py-4 relative z-10 flex flex-col gap-3">
                
                <div class="grid grid-cols-2 gap-3">
                    <button class="btn-outline bg-daruma-panel/50 border border-white/10 hover:bg-white/10 text-white font-display font-bold text-sm py-3.5 rounded-2xl flex items-center justify-center gap-2 transition-colors backdrop-blur-sm">
                        <i class="fa-solid fa-download text-gray-400"></i>
                        <span>Save Image</span>
                    </button>
                    <button class="btn-outline bg-daruma-panel/50 border border-white/10 hover:bg-white/10 text-white font-display font-bold text-sm py-3.5 rounded-2xl flex items-center justify-center gap-2 transition-colors backdrop-blur-sm">
                        <i class="fa-solid fa-share-nodes text-gray-400"></i>
                        <span>Share Wish</span>
                    </button>
                </div>

                <button class="btn-press w-full bg-gradient-to-r from-daruma-purple to-purple-700 text-white font-display font-bold text-base py-4 rounded-2xl shadow-button flex items-center justify-center gap-2 hover:from-purple-600 hover:to-purple-800 transition-all mt-2">
                    <i class="fa-solid fa-earth-americas"></i>
                    <span>Post to Community Wall</span>
                </button>

                <button class="w-full text-gray-400 hover:text-white font-display font-bold text-sm py-3 mt-2 transition-colors flex items-center justify-center gap-2">
                    <i class="fa-solid fa-plus text-xs"></i>
                    <span>Start Another Wish</span>
                </button>

            </section>

        </main>

        <!-- Bottom Navigation Bar -->
        <nav id="bottom-nav" class="fixed bottom-0 w-full max-w-[480px] bg-[#141722]/95 backdrop-blur-lg border-t border-white/5 pb-safe pt-2 px-6 flex justify-between items-center z-50 rounded-t-3xl shadow-[0_-10px_30px_rgba(0,0,0,0.5)]">
            <a href="#" class="flex flex-col items-center p-2 text-daruma-purple relative">
                <div class="absolute -top-1 w-8 h-1 bg-daruma-purple rounded-b-full shadow-[0_0_10px_rgba(168,85,247,0.8)]"></div>
                <div class="w-12 h-12 rounded-xl bg-daruma-purple/10 flex items-center justify-center mb-1">
                    <i class="fa-solid fa-house text-xl"></i>
                </div>
                <span class="text-[10px] font-bold">Home</span>
            </a>
            <a href="#" class="flex flex-col items-center p-2 text-gray-500 hover:text-gray-300 transition-colors">
                <div class="w-12 h-12 rounded-xl flex items-center justify-center mb-1">
                    <i class="fa-solid fa-earth-americas text-xl"></i>
                </div>
                <span class="text-[10px] font-bold">Community</span>
            </a>
            <a href="#" class="flex flex-col items-center p-2 text-gray-500 hover:text-gray-300 transition-colors">
                <div class="w-12 h-12 rounded-xl flex items-center justify-center mb-1">
                    <i class="fa-solid fa-book-bookmark text-xl"></i>
                </div>
                <span class="text-[10px] font-bold">Archive</span>
            </a>
            <a href="#" class="flex flex-col items-center p-2 text-gray-500 hover:text-gray-300 transition-colors">
                <div class="w-12 h-12 rounded-xl flex items-center justify-center mb-1">
                    <i class="fa-solid fa-user text-xl"></i>
                </div>
                <span class="text-[10px] font-bold">Profile</span>
            </a>
        </nav>

    </div>

    <!-- Confetti Script -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('confetti-container');
            const colors = ['#A855F7', '#F4B942', '#E04A3A', '#71E07E', '#2471E7'];
            
            function createConfetti() {
                for (let i = 0; i < 50; i++) {
                    const confetti = document.createElement('div');
                    confetti.classList.add('confetti-piece');
                    
                    // Randomize properties
                    const left = Math.random() * 100;
                    const animationDuration = 2 + Math.random() * 3;
                    const animationDelay = Math.random() * 0.5;
                    const color = colors[Math.floor(Math.random() * colors.length)];
                    const size = 5 + Math.random() * 10;
                    
                    confetti.style.left = `${left}%`;
                    confetti.style.backgroundColor = color;
                    confetti.style.width = `${size}px`;
                    confetti.style.height = `${size * (Math.random() > 0.5 ? 1 : 2)}px`; // Some squares, some rectangles
                    confetti.style.animation = `confetti ${animationDuration}s ease-out ${animationDelay}s forwards`;
                    
                    container.appendChild(confetti);
                }
            }
            
            // Trigger confetti after a slight delay
            setTimeout(createConfetti, 300);
        });
    </script>
</body>
</html>
